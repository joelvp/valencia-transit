services:
  postgres:
    image: postgres:17
    container_name: metrovalencia-db
    environment:
      POSTGRES_DB: metrovalencia
      POSTGRES_USER: metro
      POSTGRES_PASSWORD: metro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metro -d metrovalencia"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: metrovalencia-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://metro:metro@postgres:5432/metrovalencia
      - APP_ENV=local
      - BOT_TOKEN=${BOT_TOKEN:-placeholder}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
